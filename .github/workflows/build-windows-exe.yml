name: Build Windows EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Allows you to run it manually

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6   # Updated from v4

      - name: Setup Java
        uses: actions/setup-java@v5   # Updated from v4
        with:
          distribution: 'temurin'
          java-version: '21'          # Good choice for modern Kotlin/Compose

      - name: Grant execute permission for gradlew (if needed)
        run: chmod +x gradlew
        if: runner.os != 'Windows'

      - name: Build and Package Windows EXE (Compose Desktop)
        run: ./gradlew packageDistributionForCurrentOS --no-daemon --stacktrace

      - name: Upload Windows Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/compose/binaries/main-release/app/   # Common path for Compose Desktop
          if-no-files-found: warn
